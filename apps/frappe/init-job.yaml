apiVersion: batch/v1
kind: Job
metadata:
  name: frappe-init
  namespace: frappe
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: default
      restartPolicy: Never
      initContainers:
        - name: wait-for-db
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              until nc -z mariadb.mariadb.svc.cluster.local 3306; do
                echo "Waiting for MariaDB..."
                sleep 2
              done
              echo "MariaDB is ready!"
      containers:
        - name: frappe-init
          image: ghcr.io/etuh/frappe:2026-05-08
          imagePullPolicy: Always
          env:
            - name: FRAPPE_SITE_NAME
              valueFrom:
                secretKeyRef:
                  name: frappe-secrets
                  key: frappe-site-name
            - name: DB_HOST
              value: mariadb.mariadb.svc.cluster.local
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: frappe
            - name: DB_USER
              value: frappe
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: frappe-secrets
                  key: db-password
            - name: REDIS_HOST
              value: redis-master.redis.svc.cluster.local
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: frappe-secrets
                  key: redis-password
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: frappe-secrets
                  key: admin-password
          command: ["/usr/local/bin/entrypoint.sh"]
          args:
            - /bin/bash
            - -c
            - |
              set -e
              SITE_NAME=$(echo "$FRAPPE_SITE_NAME")
              echo "Initializing Frappe site: $SITE_NAME"

              cd /home/frappe/frappe-bench

              # Check if site already exists
              if [ -d "sites/$SITE_NAME" ]; then
                echo "Site $SITE_NAME already exists, running migrations..."
                bench --site $SITE_NAME migrate
              else
                echo "Creating new site $SITE_NAME..."
                bench new-site $SITE_NAME \
                  --db-host=$DB_HOST \
                  --db-port=$DB_PORT \
                  --db-name=$DB_NAME \
                  --db-user=$DB_USER \
                  --db-password=$DB_PASSWORD \
                  --mariadb-root-password=$DB_PASSWORD \
                  --admin-password=$ADMIN_PASSWORD \
                  --install-app frappe
                echo "Site $SITE_NAME created successfully!"
              fi
          volumeMounts:
            - name: sites
              mountPath: /home/frappe/frappe-bench/sites
      volumes:
        - name: sites
          persistentVolumeClaim:
            claimName: frappe-sites
