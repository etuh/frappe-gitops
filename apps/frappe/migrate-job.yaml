apiVersion: batch/v1
kind: Job
metadata:
  name: frappe-migrate
  labels:
    app: frappe
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: frappe
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: ghcr.io/etuh/frappe:2026-05-08
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              bench migrate || {
                EXIT_CODE=$?
                if [ $EXIT_CODE -eq 0 ]; then
                  exit 0
                fi
                # Check if error is about no migrations
                if bench migrate 2>&1 | grep -q "Nothing to migrate"; then
                  exit 0
                fi
                exit $EXIT_CODE
              }
          volumeMounts:
            - name: sites
              mountPath: /home/frappe/frappe-bench/sites
      volumes:
        - name: sites
          persistentVolumeClaim:
            claimName: frappe-sites
