apiVersion: apps/v1
kind: Deployment
metadata:
  name: frappe
  labels:
    app: frappe
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frappe
  template:
    metadata:
      labels:
        app: frappe
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
      initContainers:
        - name: wait-for-db
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              until nc -z mariadb.mariadb.svc.cluster.local 3306; do
                echo "Waiting for MariaDB..."
                sleep 2
              done
              echo "MariaDB is ready!"
        - name: wait-for-cache
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              until nc -z redis-master.redis.svc.cluster.local 6379; do
                echo "Waiting for Redis..."
                sleep 2
              done
              echo "Redis is ready!"
      containers:
        - name: frappe
          image: ghcr.io/etuh/frappe:2026-05-08
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: FRAPPE_SITE_NAME
              valueFrom:
                secretKeyRef:
                  name: frappe-secrets
                  key: frappe-site-name
            - name: DB_HOST
              value: mariadb.mariadb.svc.cluster.local
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: frappe
            - name: DB_USER
              value: frappe
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: frappe-secrets
                  key: db-password
            - name: REDIS_HOST
              value: redis-master.redis.svc.cluster.local
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: frappe-secrets
                  key: redis-password
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: frappe-secrets
                  key: admin-password
          readinessProbe:
            httpGet:
              path: /api/method/ping
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /api/method/ping
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          volumeMounts:
            - name: sites
              mountPath: /home/frappe/frappe-bench/sites
            - name: logs
              mountPath: /home/frappe/frappe-bench/logs
      volumes:
        - name: sites
          persistentVolumeClaim:
            claimName: frappe-sites
        - name: logs
          emptyDir: {}
