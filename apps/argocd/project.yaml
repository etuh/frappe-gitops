apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: frappe-platform
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  description: GitOps for the Frappe platform and supporting services.
  sourceRepos:
    - https://github.com/etuh/frappe-gitops.git
  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: frappe
      server: https://kubernetes.default.svc
    - namespace: ingress
      server: https://kubernetes.default.svc
    - namespace: cert-manager
      server: https://kubernetes.default.svc
    - namespace: mariadb
      server: https://kubernetes.default.svc
    - namespace: redis
      server: https://kubernetes.default.svc
    - namespace: storage
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: secrets
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
