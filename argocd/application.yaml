apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frappe
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/etuh/frappe-gitops.git
    targetRevision: HEAD
    path: overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: frappe
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
