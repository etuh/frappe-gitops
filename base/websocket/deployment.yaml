apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frappe
      role: websocket
  template:
    metadata:
      labels:
        app: frappe
        role: websocket
    spec:
      containers:
        - name: websocket
          image: ghcr.io/etuh/frappe:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              cd /home/frappe/frappe-bench
              export REDIS_SOCKETIO="redis://redis-queue:6379"
              exec node apps/frappe/socketio.js
          env:
            - name: SOCKETIO_PORT
              value: "9000"
          volumeMounts:
            - name: sites
              mountPath: /home/frappe/frappe-bench/sites
            - name: site-config
              mountPath: /home/frappe/frappe-bench/sites/common_site_config.json
              subPath: common_site_config.json
      volumes:
        - name: sites
          persistentVolumeClaim:
            claimName: frappe-sites
        - name: site-config
          configMap:
            name: common-site-config
