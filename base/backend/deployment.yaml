apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frappe
      role: backend
  template:
    metadata:
      labels:
        app: frappe
        role: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/etuh/frappe:2026-05-08
          command: ["/home/frappe/frappe-bench/env/bin/gunicorn"]
          args:
            - "--chdir=/home/frappe/frappe-bench/sites"
            - "--bind=0.0.0.0:8000"
            - "--workers=1"
            - "--worker-class=gthread"
            - "frappe.app:application"
          env:
            - name: SITE_NAME
              value: "frappe.dairyndumberi.local"
          volumeMounts:
            - name: sites
              mountPath: /home/frappe/frappe-bench/sites
            - name: site-config
              mountPath: /home/frappe/frappe-bench/sites/common_site_config.json
              subPath: common_site_config.json
          livenessProbe:
            httpGet:
              path: /api/method/frappe.ping
              port: 8000
              httpHeaders:
                - name: Host
                  value: "frappe.dairyndumberi.local"
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/method/frappe.ping
              port: 8000
              httpHeaders:
                - name: Host
                  value: "frappe.dairyndumberi.local"
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
      volumes:
        - name: sites
          persistentVolumeClaim:
            claimName: frappe-sites
        - name: site-config
          configMap:
            name: common-site-config
