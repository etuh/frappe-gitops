apiVersion: batch/v1
kind: Job
metadata:
  name: frappe-site-init
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  template:
    spec:
      restartPolicy: Never
      volumes:
        - name: sites
          persistentVolumeClaim:
            claimName: frappe-sites
        - name: site-config
          configMap:
            name: common-site-config
      containers:
        - name: init
          image: ghcr.io/etuh/frappe:2026-05-08
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e

              echo "Waiting for MariaDB..."

              # Use bash built-in tcp testing to avoid depending on 'nc'
              until (echo > /dev/tcp/mariadb/3306) >/dev/null 2>&1; do
                echo "MariaDB not ready, waiting..."
                sleep 5
              done

              echo "MariaDB is ready"

              cd /home/frappe/frappe-bench

              echo "Copying assets to shared sites volume..."
              apt update && apt install rsync -y
              rsync -a --delete --info=progress2 --stats /home/frappe/frappe-bench/assets/ /home/frappe/frappe-bench/sites/assets/

              if [ ! -f "sites/apps.txt" ]; then
                find apps -mindepth 1 -maxdepth 1 -type d -exec basename {} \; > sites/apps.txt
              fi

              if [ ! -d "sites/${SITE_NAME}" ]; then
                INSTALL_SITE=true
              else
                # Safely check if database exists using root access, avoiding dangerous wipe on IP changes
                DB_USER=$(cat sites/${SITE_NAME}/site_config.json | grep db_name | cut -d '"' -f 4)
                SITE_DB_PASS=$(cat sites/${SITE_NAME}/site_config.json | grep db_password | cut -d '"' -f 4)
                
                set +e
                DB_EXISTS=$(mysql -u root -p${DB_PASSWORD} -h ${DB_HOST} -e "SHOW DATABASES LIKE '${DB_USER}';" | grep "${DB_USER}")
                set -e
                
                if [ -z "$DB_EXISTS" ]; then
                  echo "Database missing. Forcing site recreation..."
                  INSTALL_SITE=true
                else
                  echo "Database exists. Ensuring global (%) access for the user..."
                  mysql -u root -p${DB_PASSWORD} -h ${DB_HOST} -e "CREATE USER IF NOT EXISTS '${DB_USER}'@'%' IDENTIFIED BY '${SITE_DB_PASS}'; GRANT ALL PRIVILEGES ON \`${DB_USER}\`.* TO '${DB_USER}'@'%'; FLUSH PRIVILEGES;"
                  INSTALL_SITE=false
                fi
              fi

              if [ "$INSTALL_SITE" = true ]; then
                bench new-site ${SITE_NAME} \
                  --force \
                  --mariadb-root-password ${DB_PASSWORD} \
                  --admin-password ${ADMIN_PASSWORD} \
                  --db-host ${DB_HOST}
                
                # Fix MariaDB user host restriction by explicitly creating and granting privileges to the user from any host (%)
                DB_USER=$(cat sites/${SITE_NAME}/site_config.json | grep db_name | cut -d '"' -f 4)
                SITE_DB_PASS=$(cat sites/${SITE_NAME}/site_config.json | grep db_password | cut -d '"' -f 4)
                mysql -u root -p${DB_PASSWORD} -h ${DB_HOST} -e "CREATE USER IF NOT EXISTS '${DB_USER}'@'%' IDENTIFIED BY '${SITE_DB_PASS}'; GRANT ALL PRIVILEGES ON \`${DB_USER}\`.* TO '${DB_USER}'@'%'; FLUSH PRIVILEGES;"

                bench --site ${SITE_NAME} install-app erpnext
                bench --site ${SITE_NAME} install-app hrms
              fi
              if [ ! -f "/home/frappe/frappe-bench/sites/${SITE_NAME}/.initialized" ]; then
                bench --site ${SITE_NAME} migrate
                touch /home/frappe/frappe-bench/sites/${SITE_NAME}/.initialized
              fi
          env:
            - name: SITE_NAME
              value: "frappe.dairyndumberi.local"
            - name: DB_HOST
              value: mariadb
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: frappe-secrets
                  key: db-password
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: frappe-secrets
                  key: admin-password
          volumeMounts:
            - name: sites
              mountPath: /home/frappe/frappe-bench/sites
            - name: site-config
              mountPath: /home/frappe/frappe-bench/sites/common_site_config.json
              subPath: common_site_config.json
